name: devsync_flutter
description: "AI-Powered Developer Matching Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ==========================================
  # State Management & Routing
  # ==========================================
  get: ^4.6.6

  # ==========================================
  # Firebase Backend
  # ==========================================
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # ==========================================
  # Network & APIs (GitHub & OpenAI)
  # ==========================================
  http: ^1.2.0

  # ==========================================
  # Security & Environment
  # ==========================================
  flutter_secure_storage: ^9.0.0
  flutter_dotenv: ^5.1.0

  # ==========================================
  # System & Permissions
  # ==========================================
  permission_handler: ^11.3.0

  # ==========================================
  # UI & Design Tools
  # ==========================================
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ==========================================
  # Assets & Env Configuration
  # ==========================================
  assets:
    - .env